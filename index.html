    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Encode+Sans+Semi+Expanded:wght@100;200;300;400;500;600;700;800;900&family=IM+Fell+Great+Primer:ital@0;1&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Playwrite+NO:wght@100..400&family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
        <title>Insight Card Component</title>
    </head>
    <body>

        <div class="main">
            <div class="navbar">
                <div class="nav-group">
                    <div class="icon"><img src="./assets/bulb.svg" alt="Bulb"></div>
                    <div class="comp-name"> Insight</div>
                </div>
                <div class="nav-group">
                    <button class="btn"><span>This Week</span><img src="./assets/chevron-down.svg" alt=""></button>
                    <div class="circle"><img src="./assets/3dot.svg" alt="" class="chev-down"></div>
                </div>
            </div>

            <div class="num">
                <div class="number"> <span id="count">0</span>%</div>
                <div class="arrow"><img src="./assets/Arrow-Right-Up.svg" alt="" class="actual-arrow"></div>
            </div>

            <div class="main-text">
                <span class="line" id="line-1">Your revenue is <b>projected to</b></span>
                <span class="line" id="line-2"><b>skyrocket</b> by the end of this</span>
                <span class="line" id="line-3">month!</span>

            </div>

            <div class="support-text">
                <span id="delay-1">Harver is on track to welcome 15K new customers,</span>
                <span id="delay-2">driving an impressive 78% boost in revenue.<br/></span>
                <span id="delay-3">Stay ahead and keep the momentum going!</span>
            </div>

            <footer>
                <div class="chev-left"> <img src="./assets/chevron-left.svg" alt="" class="chev">
                </div>
                <div class="lines">
                  <div class="large-line"></div>
                <div class="small-line"></div>
                <div class="small-line"></div>
                <div class="small-line"></div>
                <div class="small-line"></div>
                <div class="small-line"></div>
                <div class="small-line"></div>
                </div>
                <div class="chev-right"><img src="./assets/chevron-right.svg" alt="" class="chev"></div>
            </footer>

        </div>
        <script src="./sciprt.js"></script>
    </body>
    </html>
