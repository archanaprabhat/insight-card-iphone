    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Insight Card Component</title>
    </head>
    <body>
        <div class="main">
            <div class="navbar">
                <div class="nav-group">
                    <div class="icon"><img src="./assets/bulb.svg" alt="Bulb"></div>
                    <div class="comp-name"> Insight</div>
                </div>
                <div class="nav-group">
                    <button class="btn"><span>This Week</span><img src="/assets/down-chevron.svg" alt="" class="chev-down"></button>
                    <div class="circle"><img src="./assets/3dot.svg" alt="" class="chev-down"></div>
                </div>
            </div>

            <div class="num">
                <div class="number"> 92%</div>
                <div class="arrow"><img src="./assets/Arrow-Right-Up.svg" alt="" class="actual-arrow"></div>
            </div>

            <div class="main-text">
                Your revenue is <b>projected to skyrocket</b> by the end of this month!
            </div>

            <div class="support-text">
                    Harver is on track to welcome 15K new customers,
                    driving an impressive 78% boost in revenue.<br/>
                    Stay ahead and keep the momentum going!
            </div>

            <footer>
                <div class="chev-left"> <img src="./assets/chevron-left.svg" alt="" class="chev">
                </div>
                <div class="lines">
                <div class="large-line"></div>
                <div class="small-line"></div>
                <div class="small-line"></div>
                <div class="small-line"></div>
                <div class="small-line"></div>
                <div class="small-line"></div>
                <div class="small-line"></div>
                </div>
                <div class="chev-right"><img src="./assets/chevron-right.svg" alt="" class="chev"></div>
            </footer>

        </div>
    </body>
    </html>
